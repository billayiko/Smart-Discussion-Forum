<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Pulse - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Custom configurations for your theme accent color
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navyDark: '#0A192F',
                        navyLight: '#112240',
                        accentTeal: '#64FFDA',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gradient-to-br from-navyDark to-navyLight min-h-screen flex items-center justify-center font-sans antialiased text-slate-200 p-4">
    <div
        class="w-full max-w-md bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-8 shadow-2xl transition-all duration-300 hover:border-white/20">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2">Academic Pulse</h2>
            <p class="text-sm text-slate-400">Create your community account</p>
        </div>

        <form class="space-y-5">
            <div>
                <label class="block text-xs font-semibold tracking-wider uppercase text-slate-400 mb-2">Full
                    Name</label>
                <input type="text" placeholder="Bernadette"
                    class="w-full bg-navyDark/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accentTeal/50 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-semibold tracking-wider uppercase text-slate-400 mb-2">University
                    Email</label>
                <input type="email" placeholder="username@pulse.mak.ac.ug"
                    class="w-full bg-navyDark/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accentTeal/50 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-semibold tracking-wider uppercase text-slate-400 mb-2">Password</label>
                <input type="password" placeholder="••••••••"
                    class="w-full bg-navyDark/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accentTeal/50 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-semibold tracking-wider uppercase text-slate-400 mb-2">Confirm
                    Password</label>
                <input type="password" placeholder="••••••••"
                    class="w-full bg-navyDark/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accentTeal/50 transition-colors">
            </div>

            <div class="flex items-start items-center gap-3 py-1">
                <input type="checkbox" id="rules"
                    class="accent-accentTeal h-4 w-4 rounded border-white/10 bg-navyDark/50 text-accentTeal focus:ring-0">
                <label for="rules" class="text-xs text-slate-400 selection:bg-transparent cursor-pointer">
                    I agree to the system guidelines and platform rules.
                </label>
            </div>

            <button type="button"
                class="w-full bg-accentTeal text-navyDark font-bold py-3 px-4 rounded-xl shadow-lg shadow-accentTeal/10 hover:bg-white hover:shadow-white/10 transition-all active:scale-[0.98] mt-2">
                Sign Up
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-400">
                Already have an account?
                <a href="#" class="text-accentTeal hover:underline ml-1 font-medium">Log In</a>
            </p>
        </div>
    </div>
</body>

</html>
